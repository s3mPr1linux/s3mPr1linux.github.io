<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfólio | Certificações</title>
    <%= csrf_meta_tags %>
    <%= csp_meta_tag %>
    
    <!-- Importação do Bulma CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    
    <%= stylesheet_link_tag "application", "data-turbo-track": "reload" %>
    <%= javascript_importmap_tags %>

    <style>
      /* Mantendo suas variáveis de Tema Escuro/Claro */
      :root {
          --bg-primary: #0f0f0f;
          --bg-secondary: #181818;
          --bg-header: linear-gradient(135deg, #1a1a1a, #222);
          --text-primary: #fff;
          --text-secondary: #aaa;
          --border-color: #333;
      }
      body.light-mode {
          --bg-primary: #f5f5f5;
          --bg-secondary: #ffffff;
          --bg-header: linear-gradient(135deg, #e0e0e0, #f0f0f0);
          --text-primary: #222;
          --text-secondary: #666;
          --border-color: #ddd;
      }
      body {
          background: var(--bg-primary);
          color: var(--text-primary);
          min-height: 100vh;
          transition: background 0.3s, color 0.3s;
      }
      
      /* Forçando o Bulma a respeitar o seu Tema Escuro */
      .box, .card {
          background-color: var(--bg-secondary);
          border: 1px solid var(--border-color);
          box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }
      .card-content .title, .card-content .subtitle, .content {
          color: var(--text-primary) !important;
      }
      .card-footer {
          border-top: 1px solid var(--border-color);
      }
      .card-footer-item {
          border-right: 1px solid var(--border-color);
      }
      .title.is-custom-header {
          color: #ff4655 !important;
      }

      /* Lightbox Estilos Mantidos */
      .lightbox {
          position: fixed; top: 0; left: 0; width: 100%; height: 100%;
          background: rgba(0,0,0,0.85); display: none; align-items: center;
          justify-content: center; z-index: 1000;
      }
      .lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }
      .lightbox a.verify {
          display: block; color: #ff4655; text-align: center;
          margin-top: 15px; text-decoration: none; font-size: 1.1em;
      }
      .lightbox a.verify:hover { text-decoration: underline; }
    </style>
  </head>

  <body>
    <!-- Cabeçalho (Hero) com classes Bulma -->
    <section class="hero is-small" style="background: var(--bg-header); border-bottom: 1px solid var(--border-color);">
      <div class="hero-head pt-3 pr-4">
        <div class="is-flex is-justify-content-flex-end" style="gap: 10px;">
          <button class="button is-small is-dark is-outlined" onclick="toggleTheme()" id="theme-btn">🌙</button>
          <button class="button is-small is-dark is-outlined" onclick="toggleLanguage()" id="lang-btn">EN</button>
          <%= link_to "+ Novo", new_certificate_path, class: "button is-small is-info is-outlined" %>
        </div>
      </div>
      <div class="hero-body has-text-centered py-4">
        <h1 class="title is-3 is-custom-header" data-lang-pt="🎓 Certificações" data-lang-en="🎓 Certifications">🎓 Certificações</h1>
      </div>
    </section>

    <!-- Container Principal do Bulma -->
    <section class="section">
      <div class="container is-max-widescreen">
        <%= yield %>
      </div>
    </section>

    <script>
      // Sistema de Temas
      function toggleTheme() {
          const body = document.body;
          const btn = document.getElementById('theme-btn');
          if (body.classList.contains('light-mode')) {
              body.classList.remove('light-mode');
              btn.textContent = '🌙';
              localStorage.setItem('theme', 'dark');
          } else {
              body.classList.add('light-mode');
              btn.textContent = '☀️';
              localStorage.setItem('theme', 'light');
          }
      }

      // Sistema de Tradução
      let currentLang = 'pt';
      function toggleLanguage() {
          const btn = document.getElementById('lang-btn');
          currentLang = currentLang === 'pt' ? 'en' : 'pt';
          btn.textContent = currentLang === 'pt' ? 'EN' : 'PT';
          localStorage.setItem('language', currentLang);
          updateLanguage();
      }

      function updateLanguage() {
          const elements = document.querySelectorAll('[data-lang-pt][data-lang-en]');
          elements.forEach(el => {
              const text = currentLang === 'pt' ? el.getAttribute('data-lang-pt') : el.getAttribute('data-lang-en');
              if (el.tagName === 'OPTION' || el.tagName === 'LABEL' || el.tagName === 'SPAN' || el.tagName === 'H1' || el.tagName === 'A') {
                  el.textContent = text;
              } else {
                  el.innerHTML = text;
              }
          });
      }

      window.addEventListener('DOMContentLoaded', () => {
          const savedTheme = localStorage.getItem('theme');
          if (savedTheme === 'light') {
              document.body.classList.add('light-mode');
              document.getElementById('theme-btn').textContent = '☀️';
          }
          const savedLang = localStorage.getItem('language');
          if (savedLang === 'en') {
              currentLang = 'en';
              document.getElementById('lang-btn').textContent = 'PT';
              updateLanguage();
          }
      });

      // Sistema de Lightbox
      function openLightbox(imgSrc, verifyUrl) {
          const lb = document.getElementById('lightbox');
          document.getElementById('lightbox-img').src = imgSrc;
          document.getElementById('lightbox-link').href = verifyUrl;
          lb.style.display = 'flex';
      }

      function closeLightbox() {
          document.getElementById('lightbox').style.display = 'none';
      }
    </script>
  </body>
</html>
